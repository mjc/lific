name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2

      - name: Ensure web/dist exists for rust-embed
        run: mkdir -p web/dist

      - name: Clippy
        # --all-targets covers tests + binaries + examples so lint regressions
        # in test code (e.g. clippy::await_holding_lock) get caught here too.
        # -D warnings keeps the bar high; if a future Rust release adds noisy
        # style lints, allow them per-lint in code rather than weakening CI.
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test --all-targets

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install documentation site dependencies
        run: bun install --frozen-lockfile
        working-directory: site
      - name: Build documentation site
        run: bun run build
        working-directory: site
      - name: Check documented surfaces and local links
        # The documentation PRs are intentionally independent slices. The
        # full parity check compares against the current release baseline and
        # therefore runs after those slices land on master; PRs still build
        # the site so MDX/TypeScript errors are caught before merge.
        if: github.event_name == 'push'
        run: bun scripts/check-docs.mjs
