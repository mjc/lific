name: Release

# Triggered by pushing a version tag (e.g. v1.4.0).
#
# The tag MUST originate on the maintainer-only `magi` remote (origin in that
# checkout) so the magi→github push mirror
# replicates it. Do NOT have this workflow create the tag on the github side:
# the mirror runs `git push --mirror`, which prunes any github ref that isn't
# on magi. A github-only tag therefore gets deleted on the next mirror sync,
# and github silently demotes the now-tagless release to a *draft*. That
# stranded every release v1.2.0–v1.3.1 (LIF-120). Because the tag now comes
# from magi, the mirror keeps it and the release stays published.
#
# Release ritual (maintainer-only mirror details are not required in public
# clones):
#   1. bump Cargo.toml, commit, and push the version change (no release yet)
#   2. `git tag vX.Y.Z && git push origin vX.Y.Z`     (fires this workflow)
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # Fail fast if the tag and Cargo.toml disagree — otherwise we'd ship a
  # GitHub release named one version while crates.io publishes another.
  verify:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Verify tag matches Cargo.toml version
        id: v
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CARGO_VERSION="$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')"
          echo "tag=${GITHUB_REF_NAME} (version ${TAG_VERSION}), Cargo.toml=${CARGO_VERSION}"
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match Cargo.toml version ${CARGO_VERSION}. Bump Cargo.toml to ${TAG_VERSION} (or tag the right commit) before releasing."
            exit 1
          fi
          echo "version=${CARGO_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Verify server.json version matches the tag
        # server.json feeds the MCP Registry publish job (publish-registry
        # below). The registry is versioned and rejects a re-publish of an
        # existing version, so a stale server.json would either publish the
        # WRONG version or get silently rejected on the next release. Assert
        # both the top-level `version` and packages[0].version equal the tag,
        # here in verify, so a drifted server.json fails the whole release fast
        # instead of surfacing at the very last job.
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          TOP_VERSION="$(jq -r '.version' server.json)"
          PKG_VERSION="$(jq -r '.packages[0].version' server.json)"
          echo "tag=${TAG_VERSION}, server.json .version=${TOP_VERSION}, .packages[0].version=${PKG_VERSION}"
          if [ "$TOP_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::server.json .version is '${TOP_VERSION}', expected '${TAG_VERSION}'. Bump server.json's top-level version to ${TAG_VERSION} before releasing."
            exit 1
          fi
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::server.json .packages[0].version is '${PKG_VERSION}', expected '${TAG_VERSION}'. Bump it to ${TAG_VERSION} before releasing."
            exit 1
          fi
      - name: Verify CHANGELOG.md has a section for this version
        # The publish job extracts the TOP `## ` section of CHANGELOG.md as the
        # GitHub release body. If the changelog wasn't updated before tagging,
        # that top section is the PREVIOUS release's notes and they get shipped
        # silently (this is how v1.4.1 went out under v1.4.0's notes — LIF-148).
        # Assert the newest heading actually names this version, before any
        # builds run.
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TOP_HEADING="$(grep -m1 '^## ' CHANGELOG.md || true)"
          echo "top changelog heading: ${TOP_HEADING}"
          if ! printf '%s' "$TOP_HEADING" | grep -q "v${VERSION}\b"; then
            echo "::error::CHANGELOG.md's top section is '${TOP_HEADING}', which does not name v${VERSION}. Add the v${VERSION} section at the top of CHANGELOG.md before tagging."
            exit 1
          fi

  test:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Ensure web/dist exists for rust-embed
        run: mkdir -p web/dist
      - run: cargo test

  build:
    needs: [verify, test]
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: lific-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: lific-linux-aarch64
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            name: lific-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: lific-macos-aarch64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Build the embedded web UI before cargo build, so rust-embed
      # picks it up and bakes it into the release binary. Without this
      # the binary would ship without a web frontend.
      - uses: oven-sh/setup-bun@v2
      - name: Build web frontend
        run: |
          cd web
          bun install --frozen-lockfile
          bun run build
        shell: bash

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/lific ${{ matrix.name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  release:
    needs: [verify, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: binaries
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd binaries
          sha256sum * > sha256sums.txt
          cat sha256sums.txt

      # Use the curated top section of CHANGELOG.md as the release notes
      # (accurate, human-written) instead of gh's autogenerated commit list.
      # Extracts everything between the first "## " heading and the next one.
      - name: Extract release notes from CHANGELOG
        run: |
          awk '/^## /{n++; next} n==1{print}' CHANGELOG.md > RELEASE_NOTES.md
          echo "----- release notes preview -----"
          cat RELEASE_NOTES.md

      # The tag already exists (it triggered this run); gh attaches the
      # release to it. We do NOT create or push a tag here — see the header.
      # Fall back to --generate-notes if the CHANGELOG section came up empty
      # (e.g. someone forgot to add the entry), so a release never ships
      # with no notes at all.
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NOTES_ARG="--generate-notes"
          if [ -s RELEASE_NOTES.md ]; then
            NOTES_ARG="--notes-file RELEASE_NOTES.md"
          fi
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            $NOTES_ARG \
            --latest \
            binaries/lific-linux-x86_64 \
            binaries/lific-linux-aarch64 \
            binaries/lific-macos-x86_64 \
            binaries/lific-macos-aarch64 \
            binaries/sha256sums.txt

      # Belt-and-suspenders against gh's occasional draft-fallback at create
      # time. The real fix for the LIF-120 strandings is the magi-origin tag
      # above; this just re-asserts the published state and is idempotent.
      - name: Publish release (force non-draft)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release edit "${GITHUB_REF_NAME}" \
            --draft=false \
            --latest

  publish:
    needs: [verify, release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # Build the web UI before publishing so the source tarball that
      # goes to crates.io contains a working dist/, not just a stub.
      # `cargo install lific` builds from source — without this, every
      # crates.io install would produce a UI-less binary.
      - uses: oven-sh/setup-bun@v2
      - name: Build web frontend
        run: |
          cd web
          bun install --frozen-lockfile
          bun run build
      # Tolerate exactly one failure mode — the version already being on
      # crates.io (idempotent re-run of the workflow) — and fail the job on
      # everything else. The old `|| echo` swallowed ALL failures, which let
      # a 403 auth error report success during v2.0.0 (LIF-288).
      - name: Publish to crates.io
        run: |
          set -o pipefail
          if out="$(cargo publish --allow-dirty --no-verify 2>&1)"; then
            echo "$out"
          else
            echo "$out"
            if printf '%s\n' "$out" | grep -qiE 'crate version .* is already uploaded'; then
              echo "::notice::Version already on crates.io; treating as success."
            else
              echo "::error::cargo publish failed."
              exit 1
            fi
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # Publish server metadata to the official MCP Registry
  # (registry.modelcontextprotocol.io). See docs/mcp-registry.md for the full
  # story. This is a THIN, LATE step: the registry stores metadata only and
  # points at the crate on crates.io, so it must run AFTER `publish` — the crate
  # (and the `mcp-name:` ownership marker in its README) has to be live before
  # the registry fetches and validates it.
  #
  # This job is deliberately non-fatal: `continue-on-error: true` means a flaky
  # or slow registry never fails an otherwise-successful release (the binaries
  # and crates.io publish have already shipped by the time we get here). If the
  # registry publish fails, re-run it manually per docs/mcp-registry.md.
  publish-registry:
    needs: [verify, publish]
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      id-token: write   # required for `mcp-publisher login github-oidc`
      contents: read
    env:
      # Pin the publisher CLI + its linux/amd64 checksum rather than tracking
      # releases/latest — reproducibility and supply-chain hygiene (a fetched
      # `latest` binary is unverifiable at run time). Re-pin VERSION and SHA256
      # together when bumping; the SHA is the digest of
      # mcp-publisher_linux_amd64.tar.gz for this release.
      MCP_PUBLISHER_VERSION: v1.7.9
      MCP_PUBLISHER_SHA256: ab128162b0616090b47cf245afe0a23f3ef08936fdce19074f5ba0a4469281ac
    steps:
      - uses: actions/checkout@v4

      - name: Install mcp-publisher (pinned + checksum-verified)
        run: |
          set -euo pipefail
          url="https://github.com/modelcontextprotocol/registry/releases/download/${MCP_PUBLISHER_VERSION}/mcp-publisher_linux_amd64.tar.gz"
          curl -fsSL "$url" -o mcp-publisher.tar.gz
          echo "${MCP_PUBLISHER_SHA256}  mcp-publisher.tar.gz" | sha256sum -c -
          tar -xzf mcp-publisher.tar.gz mcp-publisher
          chmod +x mcp-publisher
          ./mcp-publisher --version || true

      # GitHub OIDC: the `id-token: write` permission above lets mcp-publisher
      # prove ownership of the io.github.VoidNullable/* namespace from the
      # workflow's OIDC token — no stored secret or PAT required. The namespace
      # casing (capital V, N) must match server.json's `name` and the README
      # marker exactly; the registry's namespace check is case-sensitive
      # (see docs/mcp-registry.md → "Namespace and casing").
      - name: Authenticate to MCP Registry (GitHub OIDC)
        run: ./mcp-publisher login github-oidc

      # Wait for the just-published crate version to be visible on crates.io
      # before publishing to the registry. The registry verifies crate
      # ownership by fetching the crate's README (the `mcp-name:` marker), so
      # it must be live first. The `publish` job already ran `cargo publish`,
      # but the crates.io index/CDN takes a few seconds to propagate.
      - name: Wait for crate version on crates.io
        run: |
          set -uo pipefail
          IDENT="$(jq -r '.packages[0].identifier' server.json)"
          VERSION="$(jq -r '.packages[0].version' server.json)"
          echo "Waiting for ${IDENT}@${VERSION} on crates.io..."
          for i in $(seq 1 24); do   # 24 x 5s = 2 min cap
            if curl -fsS "https://crates.io/api/v1/crates/${IDENT}/${VERSION}" >/dev/null 2>&1; then
              echo "Found ${IDENT}@${VERSION}"
              exit 0
            fi
            echo "  attempt ${i}: not visible yet, sleeping 5s"
            sleep 5
          done
          echo "::warning::${IDENT}@${VERSION} still not visible on crates.io after 2 min; attempting registry publish anyway."

      # Publish server.json to the registry. Retry to absorb crates.io
      # propagation lag on the ownership check, but fail fast on a deterministic
      # 422 validation rejection (a bad server.json — retrying just burns time).
      - name: Publish to MCP Registry
        run: |
          set -uo pipefail
          for i in $(seq 1 10); do
            if out="$(./mcp-publisher publish 2>&1)"; then
              echo "$out"
              echo "Published to the MCP Registry."
              exit 0
            fi
            echo "$out"
            if printf '%s' "$out" | grep -qiE '422|validation'; then
              echo "::error::MCP Registry rejected server.json (validation error) — fix server.json; retrying won't help."
              exit 1
            fi
            echo "::warning::publish attempt ${i} failed (registry flaky or crate not yet propagated); waiting 15s"
            sleep 15
          done
          echo "::error::MCP Registry publish did not succeed after retries."
          exit 1
